name: Auto Update News

on:
  # 毎日日本時間の朝7時(UTCで前日の22時)に実行
  schedule:
    - cron: '0 22 * * *'
  # 手動でも実行できるようにする
  workflow_dispatch:

permissions:
  contents: write # コミット権限を付与

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存関係のインストール
        run: npm install
        # もし news フォルダをルート以外に置いている場合は
        # working-directory: ./news などでパスを指定します

      - name: scraper.js の実行
        run: node scraper.js

      - name: 変更があったらコミットしてPush
        run: |
          # Gitの設定
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # news.json に差分があるか確認し、あればコミット
          git add news.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 🌞 自動ニュース収集の実行" && git push)
