<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電工ニュース要約ボード</title>
    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <span class="material-symbols-outlined logo-icon">electric_bolt</span>
                <h1>電工デイリー・インサイト</h1>
                <p class="subtitle">AI要約に基づく電気工事の最新トレンドと影響度分析</p>
            </div>
            <input type="date" class="header-date" id="current-date">
        </header>

        <main class="main-content">
            <!-- Global Impact Summary -->
            <section class="global-summary glass-panel" id="global-summary-container">
                <!-- JS Inject -->
            </section>

            <!-- Ranked News List -->
            <section class="news-section">
                <div class="section-header">
                    <h2><span class="material-symbols-outlined">format_list_numbered</span> 今日の重要トピックス Top 10</h2>
                    <div class="filter-controls" id="filter-controls">
                        <!-- Filters (Optional but good for UX) -->
                    </div>
                </div>
                <div class="news-list" id="news-list-container">
                    <!-- JS Inject -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
